spring.application.name=ai-academic-planner
server.port=8080

# Set these for local dev when Postgres is ready
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aiplanner}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
